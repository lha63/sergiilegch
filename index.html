  <a class="skip-link" href="#screen">Үндсэн агуулга руу шилжих</a>

  <!-- Утасны хүрээ (desktop дээр харагдах) -->
  <div class="phone">
    <!-- Статус мөр -->
    <div class="statusbar">
      <span class="statusbar__time" id="clock">21:40</span>
      <span class="statusbar__dynamic-island" aria-hidden="true"></span>
      <span class="statusbar__icons" aria-hidden="true">
        <svg class="statusbar__icon" viewBox="0 0 24 24"><path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 4v16" stroke-width="2.5"/></svg>
        <span class="statusbar__batt">82%</span>
      </span>
    </div>

    <!-- Дэлгэцүүд энд render хийгдэнэ -->
    <main class="screen" id="screen" tabindex="-1"></main>

    <!-- Хөвөгч нууц SOS товч (бүх горим дээр шууд ашиглах) -->
    <button class="fab-discreet" id="fabDiscreet" aria-label="Нууц SOS — хурдан дуудах" hidden>
      <svg class="icon" aria-hidden="true"><use href="#i-eye-off"/></svg>
    </button>

    <!-- Доод навигац (≤5 item) -->
    <nav class="tabbar" id="tabbar" aria-label="Үндсэн навигац">
      <button class="tab" data-route="home" aria-label="Эхлэл">
        <svg class="tab__icon" aria-hidden="true"><use href="#i-home"/></svg>
        <span class="tab__label">Эхлэл</span>
      </button>
      <button class="tab" data-route="map" aria-label="Газрын зураг">
        <svg class="tab__icon" aria-hidden="true"><use href="#i-map"/></svg>
        <span class="tab__label">Зураг</span>
      </button>
      <button class="tab tab--sos" data-route="sos" aria-label="Яаралтай тусламж дуудах (SOS)">
        <span class="tab__sos-ring"><span class="tab__sos-text">SOS</span></span>
      </button>
      <button class="tab" data-route="score" aria-label="Хорооны оноо">
        <svg class="tab__icon" aria-hidden="true"><use href="#i-trending"/></svg>
        <span class="tab__label">Хороо</span>
      </button>
      <button class="tab" data-route="profile" aria-label="Профайл">
        <svg class="tab__icon" aria-hidden="true"><use href="#i-user"/></svg>
        <span class="tab__label">Профайл</span>
      </button>
    </nav>
  </div>
